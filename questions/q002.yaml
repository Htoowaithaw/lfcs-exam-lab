question: |
  Configure /srv/lfcs/q002/secret.txt so it is owned by root:adm and has mode 0640.
  Create a symbolic link at /opt/q002-secret that points to /srv/lfcs/q002/secret.txt.
hints: ["Use chown and chmod.", "Use ln -s for symbolic links."]

id: q008
title: "Create persistent swap"
domain: "Storage"
topic: "swap"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create a 128 MiB swap file at /swap-lfcs, activate it, and make it persistent in /etc/fstab.
hints: ["Use fallocate or dd, chmod 600, mkswap, swapon.", "Use swapon --show to verify."]

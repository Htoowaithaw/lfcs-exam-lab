question: |
  Files are misplaced under /var/tmp/ec-q013/incoming. Create /srv/ec-q013/{docs,bin,data}; move every *.md file into docs, every *.sh file into bin, and every *.csv file into data. Make the shell scripts executable and leave no files in incoming.

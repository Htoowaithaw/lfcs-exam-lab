id: q071
title: "Install scheduled task lfcs-op-cron5"
domain: "Operations & Deployment"
topic: "task scheduling cron/at"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create a root cron entry in /etc/cron.d/lfcs-op-cron5 that runs every 5 minutes and writes the literal text lfcs-op-cron5-ok to /var/tmp/lfcs-op-cron5.stamp.
  Use a valid /etc/cron.d format with an explicit user field.
hints: ["Files in /etc/cron.d need mode 0644.", "Include the user column."]

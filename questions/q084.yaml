id: q084
title: "Set sysctl net.ipv4.ip_forward"
domain: "Operations & Deployment"
topic: "sysctl"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Set net.ipv4.ip_forward to 1 immediately and persistently using /etc/sysctl.d/lfcs-op-sysctl1.conf.
  The runtime value and the persistent file must both match.
hints: ["Use sysctl -w for runtime.", "Use sysctl --system or sysctl -p for persistence."]

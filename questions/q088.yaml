id: q088
title: "Load AppArmor profile lfcs-op-aa2"
domain: "Operations & Deployment"
topic: "AppArmor"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create a syntactically valid enforcing AppArmor profile for /usr/local/bin/lfcs-op-aa2 at /etc/apparmor.d/usr.local.bin.lfcs-op-aa2.
  Load it so the profile appears in the enforce-mode section of aa-status.
hints: ["Use apparmor_parser -r.", "Profile names normally follow the executable path."]

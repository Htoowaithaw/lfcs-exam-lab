id: q100
title: "Create TLS certificate lfcs-op-tls1"
domain: "Operations & Deployment"
topic: "SSL/TLS openssl"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create a 2048-bit RSA private key /etc/ssl/private/lfcs-op-tls1.key and a self-signed certificate /etc/ssl/certs/lfcs-op-tls1.crt.
  Set the private key mode to 0600. The certificate subject common name must be lfcs-op-tls1.lfcs.local and the key/certificate pair must match.
hints: ["Use openssl req -x509.", "Compare public moduli or public keys."]

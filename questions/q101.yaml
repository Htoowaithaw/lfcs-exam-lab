id: q101
title: "Create TLS certificate lfcs-op-tls2"
domain: "Operations & Deployment"
topic: "SSL/TLS openssl"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create a 2048-bit RSA private key /etc/ssl/private/lfcs-op-tls2.key and a self-signed certificate /etc/ssl/certs/lfcs-op-tls2.crt.
  The certificate subject common name must be lfcs-op-tls2.lfcs.local and the key/certificate pair must match.
hints: ["Use openssl req -x509.", "Compare public moduli or public keys."]

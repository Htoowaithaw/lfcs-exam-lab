id: q108
title: "Configure local address and host entry lfcsnet4"
domain: "Networking"
topic: "IPv4/IPv6 + hostname resolution"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create a dummy interface named lfcsnet4, bring it up, assign IPv4 10.55.4.10/24 and IPv6 fd00:55:4::10/64, and add /etc/hosts entry mapping 10.55.4.10 to phase5d-net4.local.
hints: ["Use ip link add type dummy.", "Validate both ip addr and getent hosts."]

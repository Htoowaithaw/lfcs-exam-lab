id: q134
title: "Harden local SSH setting q134"
domain: "Networking"
topic: "SSH server & client"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create user sshuser3, install an authorized key, and enforce key-only SSH by setting PasswordAuthentication no and PubkeyAuthentication yes in /etc/ssh/sshd_config.d/q134.conf. Restart sshd.
hints: ["Use ssh-keygen for a local keypair.", "Validate effective sshd config with sshd -T."]

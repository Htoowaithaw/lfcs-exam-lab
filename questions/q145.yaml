id: q145
title: "Create active swap on /dev/sdc1"
domain: "Storage"
topic: "swap"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create partition /dev/sdc1 on scratch disk /dev/sdc using any size that fits the disk, format it as swap, enable it, and add a persistent fstab entry by UUID.
hints: ["Use mkswap and swapon.", "Do not use the OS disk."]

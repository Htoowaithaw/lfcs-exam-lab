id: q153
title: "Persist mount /mnt/lfcs-fstab3"
domain: "Storage"
topic: "fstab boot mounts"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create partition /dev/sde1 on scratch disk /dev/sde using any size that fits the disk, then create an ext4 filesystem labeled fstab3 on /dev/sde1, mount it at /mnt/lfcs-fstab3, add a UUID-based /etc/fstab entry, and ensure mount -a succeeds.
hints: ["Use UUID rather than a raw device path.", "Validation runs mount -a."]

id: q161
title: "Create LVM volume vglfcs2/lvdata2"
domain: "Storage"
topic: "LVM"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Use scratch disk /dev/sdg as an LVM PV, create VG vglfcs2, LV lvdata2 sized 80M, format ext4, and mount it at /mnt/lfcs-lvm2.
hints: ["Use pvcreate, vgcreate, lvcreate.", "Do not touch the OS VG."]

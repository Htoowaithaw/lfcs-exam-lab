id: q188
title: "Set nofile limit for limituser1"
domain: "Users and Groups"
topic: "ulimit resource limits"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create user limituser1 and set both soft and hard nofile limit to 2049 using /etc/security/limits.d/lfcs-limit1.conf.
hints: ["Use limits.d.", "Validate with su - user -c 'ulimit -n'."]

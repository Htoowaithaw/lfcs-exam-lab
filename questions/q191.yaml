id: q191
title: "Grant limited sudo to sudoer1"
domain: "Users and Groups"
topic: "sudo privileges"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create user sudoer1 and allow passwordless sudo for only /usr/bin/systemctl through /etc/sudoers.d/lfcs-sudo1.
hints: ["Use visudo -cf to validate sudoers syntax.", "Validate with sudo -l -U."]

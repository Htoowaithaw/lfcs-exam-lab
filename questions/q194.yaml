id: q194
title: "Grant limited sudo to sudoer4"
domain: "Users and Groups"
topic: "sudo privileges"
difficulty: medium
distro: ubuntu
vms: [node1]
question: |
  Create user sudoer4 and allow passwordless sudo for only /usr/bin/journalctl through /etc/sudoers.d/lfcs-sudo4.
hints: ["Use visudo -cf to validate sudoers syntax.", "Validate with sudo -l -U."]

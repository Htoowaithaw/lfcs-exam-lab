id: q203
title: "Mount NFS export 5"
domain: "Storage"
topic: "NFS"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  On node2, export /srv/lfcs-nfs5 to node1 (192.168.56.11) as read-only NFS. On node1, mount it at /mnt/lfcs-nfs5 persistently using node2's host-only IP 192.168.56.12. The file /srv/lfcs-nfs5/data.txt must be readable from node1 and contain NFS-5-OK.
hints: ["Configure /etc/exports on node2.", "Mount from node1 using the host-only address."]

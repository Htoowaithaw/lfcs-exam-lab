id: q205
title: "Connect NBD export lfcsnbd1"
domain: "Storage"
topic: "NBD"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  On node2, export a 64M NBD image named lfcsnbd1 from /srv/lfcsnbd1.img. On node1, connect it as /dev/nbd0, create an ext4 filesystem labeled lfcsnbd1, and mount it at /mnt/lfcsnbd1.
hints: ["Use nbd-server on node2.", "Use nbd-client from node1."]

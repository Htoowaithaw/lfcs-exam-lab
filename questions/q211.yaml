id: q211
title: "Forward node1 port 18603 to node2"
domain: "Networking"
topic: "port redirection & NAT"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  On node2, serve /lfcs-nat-3.txt on TCP 18603 with the exact content NAT-3-NODE2. On node1, using a nat-table chain named LFCSNAT, redirect locally originated TCP connections to 192.168.56.11:18603 onward to node2 192.168.56.12:18603, and enable IPv4 forwarding. (A curl from node1 to 192.168.56.11:18603 must reach the node2 backend.)
hints: ["Use iptables nat rules.", "Validate by curling node1's host-only IP."]

id: q214
title: "Forward node1 port 18606 to node2"
domain: "Networking"
topic: "port redirection & NAT"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  On node2, run a web response on TCP 18606 containing NAT-6-NODE2. On node1, redirect TCP 18606 arriving at 192.168.56.11 to node2 192.168.56.12:18606 and enable forwarding.
hints: ["Use iptables nat rules.", "Validate by curling node1's host-only IP."]

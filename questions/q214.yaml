id: q214
title: "Forward node1 port 18606 to node2"
domain: "Networking"
topic: "port redirection & NAT"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  On node2, serve /lfcs-nat-6.txt on TCP 18606 with the exact content NAT-6-NODE2. On node1, redirect TCP 18606 arriving at 192.168.56.11 to node2 192.168.56.12:18606 using a nat-table chain named LFCSNAT, and enable IPv4 forwarding.
hints: ["Use iptables nat rules.", "Validate by curling node1's host-only IP."]

id: q215
title: "Reverse proxy to node2 backend 1"
domain: "Networking"
topic: "reverse proxy & load balancer"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  On node2, serve /lfcs-proxy-1.txt on 192.168.56.12:18701 with the exact content PROXY-1-NODE2. On node1, configure nginx to listen on TCP 18801 and reverse proxy to that backend.
hints: ["Use nginx proxy_pass.", "Validate with curl against node1."]

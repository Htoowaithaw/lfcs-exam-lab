id: q223
title: "Sync chrony from node2 4"
domain: "Networking"
topic: "NTP time sync"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  Configure node2 as a chrony NTP server for node1 on the host-only network. Keep chrony active on node1 and configure its only server or pool line as exactly server 192.168.56.12 iburst, with no other time sources.
hints: ["Use chrony allow on node2.", "Use server 192.168.56.12 iburst on node1."]

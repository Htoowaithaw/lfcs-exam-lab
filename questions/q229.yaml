id: q229
title: "Configure key SSH node1 to node2 5"
domain: "Networking"
topic: "SSH server & client"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  Create user remoteuser5 on node2. From node1 root, create private key /root/.ssh/lfcs-q229, authorize it for remoteuser5 on node2, and configure alias lfcs-node2-5 for remoteuser5@192.168.56.12. Set IdentityFile /root/.ssh/lfcs-q229, IdentitiesOnly yes, and StrictHostKeyChecking yes, and add 192.168.56.12 to /root/.ssh/known_hosts. Non-interactive ssh lfcs-node2-5 true must succeed without a password.
hints: ["Install node1's public key in node2 authorized_keys.", "Use /root/.ssh/config and ssh-keyscan."]

id: q230
title: "Resolve LDAP account ldapuser1"
domain: "Users and Groups"
topic: "LDAP accounts"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  On node2 at ldap://192.168.56.12/, create uid=ldapuser1,ou=People,dc=lfcs,dc=lab as a posixAccount with uidNumber 3101, cn and sn ldapuser1, homeDirectory /home/ldapuser1, and loginShell /bin/bash. On node1, configure /etc/nslcd.conf with that URI and base dc=lfcs,dc=lab, add ldap to the passwd database in /etc/nsswitch.conf, and ensure getent passwd ldapuser1 returns the account.
hints: ["Node2 is the LDAP server.", "Node1 is the LDAP client."]

id: q230
title: "Resolve LDAP account ldapuser1"
domain: "Users and Groups"
topic: "LDAP accounts"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  Configure node2 LDAP directory dc=lfcs,dc=lab with POSIX user ldapuser1 UID 3101. Configure node1 NSS over LDAP so getent passwd ldapuser1 returns that LDAP account.
hints: ["Node2 is the LDAP server.", "Node1 is the LDAP client."]

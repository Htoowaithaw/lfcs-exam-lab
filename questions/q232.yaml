id: q232
title: "Resolve LDAP account ldapuser3"
domain: "Users and Groups"
topic: "LDAP accounts"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  On node2 at ldap://192.168.56.12/, create uid=ldapuser3,ou=People,dc=lfcs,dc=lab as a posixAccount with uidNumber 3103, cn and sn ldapuser3, homeDirectory /home/ldapuser3, and loginShell /bin/bash. On node1, configure /etc/nslcd.conf with that URI and base dc=lfcs,dc=lab, add ldap to the passwd database in /etc/nsswitch.conf, and ensure getent passwd ldapuser3 returns the account.
hints: ["Node2 is the LDAP server.", "Node1 is the LDAP client."]

id: q232
title: "Resolve LDAP account ldapuser3"
domain: "Users and Groups"
topic: "LDAP accounts"
difficulty: hard
distro: ubuntu
vms: [node1,node2]
question: |
  Configure node2 LDAP directory dc=lfcs,dc=lab with POSIX user ldapuser3 UID 3103. Configure node1 NSS over LDAP so getent passwd ldapuser3 returns that LDAP account.
hints: ["Node2 is the LDAP server.", "Node1 is the LDAP client."]

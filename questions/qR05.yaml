id: qR05
title: "Use offline dnf repository lfcs-r05-local"
domain: "Operations & Deployment"
topic: "dnf/yum repositories"
difficulty: medium
distro: rocky
vms: [lfcs-rocky1]
question: |
  Configure the offline repository at /opt/lfcs-r04-repo in /etc/yum.repos.d/lfcs-r05-local.repo.
  Set gpgcheck=0 and install lfcs-r04-tool from that local repository without using a network mirror.
hints: ["Use baseurl=file:///opt/lfcs-r04-repo.", "Disable gpgcheck for the local lab package."]
